<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新規登録 | Open e-learning</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-content">
    <div class="auth-card">
      <h1>新規登録</h1>
      <p class="subtitle">無料でアカウントを作成して、口コミを投稿・閲覧しましょう</p>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="name">ユーザー名</label>
          <input type="text" class="form-input" id="name" required placeholder="山田太郎" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input type="email" class="form-input" id="email" required placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">パスワード</label>
          <input type="password" class="form-input" id="password" required minlength="8" placeholder="8文字以上" />
        </div>
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">パスワード（確認）</label>
          <input type="password" class="form-input" id="passwordConfirm" required placeholder="••••••••" />
        </div>
        <p style="font-size:0.75rem;color:var(--gray-600);margin-bottom:1rem">
          登録することで
          <a href="#" style="color:var(--blue-600)">利用規約</a>
          および
          <a href="#" style="color:var(--blue-600)">プライバシーポリシー</a>
          に同意したものとみなされます。
        </p>
        <button type="submit" class="btn btn-primary btn-block btn-lg">アカウントを作成</button>
      </form>
      <p class="auth-footer">
        すでにアカウントをお持ちの方は
        <a href="login.html">ログイン</a>
      </p>
      <p class="mt-8 text-center">
        <a href="index.html" class="back-link" style="justify-content:center">トップページに戻る</a>
      </p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      App.renderBreadcrumb([
        { label: "トップ", path: "index.html" },
        { label: "新規登録" },
      ]);

      document.getElementById("register-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const pw = document.getElementById("password").value;
        const pw2 = document.getElementById("passwordConfirm").value;
        if (pw !== pw2) {
          App.showToast("パスワードが一致しません", "error");
          return;
        }
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userName", name);
        App.showToast("アカウントを作成しました");
        setTimeout(() => (window.location.href = "index.html"), 800);
      });
    });
  </script>
</body>
</html>
