<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | Open e-learning</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-content">
    <div class="auth-card">
      <h1>ログイン</h1>
      <p class="subtitle">アカウントにログインして口コミを投稿・閲覧しましょう</p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input type="email" class="form-input" id="email" required placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">パスワード</label>
          <input type="password" class="form-input" id="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">ログイン</button>
      </form>
      <p class="auth-footer">
        <a href="#">パスワードを忘れた方</a>
      </p>
      <p class="auth-footer">
        アカウントをお持ちでない方は
        <a href="register.html">新規登録</a>
      </p>
      <p class="mt-8 text-center">
        <a href="index.html" class="back-link" style="justify-content:center">トップページに戻る</a>
      </p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      App.renderBreadcrumb([
        { label: "トップ", path: "index.html" },
        { label: "ログイン" },
      ]);

      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userName", email.split("@")[0]);
        App.showToast("ログインしました");
        setTimeout(() => (window.location.href = "index.html"), 800);
      });
    });
  </script>
</body>
</html>
