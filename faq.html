<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q&A | Open e-learning</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-content">
    <div class="container" style="max-width:56rem">
      <div class="page-header text-center">
        <h1>❓ よくある質問</h1>
        <p style="color:var(--gray-600)">Open e-learningに関するよくある質問をまとめました</p>
      </div>

      <div id="faq-list"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const FAQ_ITEMS = [
      {
        q: "口コミを閲覧するにはどうすればよいですか？",
        a: "口コミの全文閲覧には、口コミを1件投稿する（無料）、または月額880円プランをお申し込みいただく方法があります。いずれも1か月間、すべての口コミを閲覧できます。",
      },
      {
        q: "口コミの投稿は匿名でできますか？",
        a: "はい、口コミの投稿は匿名で行うことができます。個人情報が公開されることはありませんので、安心してご利用ください。",
      },
      {
        q: "口コミを投稿した後、編集や削除はできますか？",
        a: "投稿後の口コミは編集・削除が可能です。マイページから投稿履歴を確認し、編集または削除を行うことができます。",
      },
      {
        q: "どのようなオンライン情報サービスが登録されていますか？",
        a: "ビジネス、プログラミング、デザイン、マーケティング、語学、自己啓発など、幅広いジャンルのオンライン情報サービスが登録されています。",
      },
      {
        q: "サービスの利用に料金はかかりますか？",
        a: "無料プランでは、星評価（総合評価）の確認や検索、口コミの一部プレビューなどが利用できます。すべての口コミの全文を読むには、口コミ投稿（無料）または月額880円のプランが必要です。",
      },
      {
        q: "口コミの信頼性はどのように担保されていますか？",
        a: "実際に購入・利用した方のみが口コミを投稿できるシステムになっています。また、不適切な投稿は運営によって削除される場合があります。",
      },
      {
        q: "アカウントを削除したい場合はどうすればよいですか？",
        a: "アカウント設定ページから「アカウント削除」を選択していただくか、お問い合わせフォームからご連絡ください。",
      },
      {
        q: "口コミ投稿時に注意すべきことはありますか？",
        a: "個人情報の記載、誹謗中傷、虚偽の情報、著作権を侵害する内容の投稿は禁止されています。具体的で建設的な口コミをお願いします。",
      },
    ];

    document.addEventListener("DOMContentLoaded", () => {
      App.renderBreadcrumb([
        { label: "トップ", path: "index.html" },
        { label: "Q&A" },
      ]);

      document.getElementById("faq-list").innerHTML = FAQ_ITEMS.map(
        (item, i) => `
        <div class="faq-item">
          <button type="button" class="faq-question">
            <span style="display:flex;gap:0.75rem;align-items:flex-start;text-align:left">
              <span style="flex-shrink:0;width:1.5rem;height:1.5rem;border-radius:50%;background:var(--blue-100);color:var(--blue-600);display:flex;align-items:center;justify-content:center;font-size:0.875rem;font-weight:600">Q</span>
              ${App.escapeHtml(item.q)}
            </span>
            <span class="faq-chevron">▼</span>
          </button>
          <div class="faq-answer" style="padding-left:2.25rem">${App.escapeHtml(item.a)}</div>
        </div>`
      ).join("");

      App.initFaqAccordion(".faq-question");
    });
  </script>
</body>
</html>
